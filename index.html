<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASCEND AR Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
  <style>
    body { margin: 0; background: #000; }
    #container { width: 100vw; height: 100vh; position: relative; }
    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #start-btn {
      padding: 16px 32px; background: #4CAF50; color: white;
      border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px;
    }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 12px 20px;
      border-radius: 8px; font-family: sans-serif; font-size: 14px;
      z-index: 9999; text-align: center; display: none;
    }
    p { color: white; font-family: sans-serif; font-size: 16px; text-align: center; }
  </style>
</head>
<body>
  <div id="start-screen">
    <p>🏘 ASCEND Story Tour</p>
    <p style="opacity:0.7;font-size:14px">Scan a stop QR code to begin</p>
    <button id="start-btn" onclick="startScanner()">📷 Start Scanner</button>
  </div>
  <div id="container"></div>
  <div id="status">📷 Point camera at ASCEND QR code</div>

  <script>
    const stops = ['parklet', 'ev-carport', 'refurbishment', 'mw-building', 'new-buildings'];

    async function startScanner() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').innerText = 'Loading scanner...';

      try {
        const mindar = new window.MINDAR.IMAGE.MindARThree({
          container: document.getElementById('container'),
          imageTargetSrc: 'https://jawhar00.github.io/Ascent-AR/targets.mind',
          maxTrack: 1,
          uiLoading: 'yes',
          uiScanning: 'yes'
        });

        const { renderer, scene, camera } = mindar;

        stops.forEach((stopId, i) => {
          const anchor = mindar.addAnchor(i);
          anchor.onTargetFound = () => {
            document.getElementById('status').innerHTML = `✅ ${stopId} detected — opening...`;
            setTimeout(() => {
              window.location.href = `https://playcanv.as/p/pgtU46sY/?stop=${stopId}`;
            }, 1000);
          };
        });

        await mindar.start();
        document.getElementById('status').innerText = '📷 Point camera at ASCEND QR code';
        renderer.setAnimationLoop(() => renderer.render(scene, camera));
      } catch(err) {
        document.getElementById('status').innerText = 'Error: ' + err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
