<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASCEND AR Scanner</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: white;
      padding: 12px 20px; border-radius: 8px;
      font-family: sans-serif; font-size: 14px;
      z-index: 9999; text-align: center;
    }
  </style>
</head>
<body>
  <div id="status">📷 Point camera at ASCEND QR code</div>

  <a-scene
    mindar-image="imageTargetSrc: https://jawhar00.github.io/Ascent-AR/targets.mind; maxTrack: 1"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-parklet">
      <a-plane color="#4CAF50" opacity="0.5" height="0.5" width="1"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-ev-carport">
      <a-plane color="#4CAF50" opacity="0.5" height="0.5" width="1"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-refurbishment">
      <a-plane color="#4CAF50" opacity="0.5" height="0.5" width="1"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-mw-building">
      <a-plane color="#4CAF50" opacity="0.5" height="0.5" width="1"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-new-buildings">
      <a-plane color="#4CAF50" opacity="0.5" height="0.5" width="1"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const stops = ['parklet', 'ev-carport', 'refurbishment', 'mw-building', 'new-buildings'];

    window.addEventListener('DOMContentLoaded', () => {
      stops.forEach((stopId, i) => {
        const target = document.querySelector(`#target-${stopId}`);
        target.addEventListener('targetFound', () => {
          document.getElementById('status').innerHTML = `✅ ${stopId} — opening...`;
          setTimeout(() => {
            window.location.href = `https://playcanv.as/p/pgtU46sY/?stop=${stopId}`;
          }, 1000);
        });
      });
    });
  </script>
</body>
</html>
