<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>ASCEND AR v2 — Harthof (True-Scale Occluding)</title>

<style>
  html, body { margin: 0; padding: 0; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000; color: white;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  #status {
    position: fixed; top: env(safe-area-inset-top, 20px); left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 500; z-index: 9999; text-align: center;
    max-width: calc(100vw - 40px); backdrop-filter: blur(8px);
    transition: background 0.3s ease;
  }
  #status.success { background: rgba(76,175,80,0.95); }
  #status.error { background: rgba(244,67,54,0.95); }
  #status.loading { background: rgba(255,152,0,0.95); }

  #debug-toggle {
    position: fixed; top: env(safe-area-inset-top, 20px); right: 20px;
    background: rgba(0,0,0,0.7); color: white;
    padding: 8px 12px; border-radius: 16px; font-size: 12px;
    z-index: 9999; cursor: pointer; user-select: none;
    backdrop-filter: blur(8px);
  }
  #debug-toggle.active { background: rgba(255,152,0,0.9); }

  #debug-log {
    position: fixed; bottom: 10px; left: 10px; right: 10px;
    max-height: 30vh; overflow-y: auto;
    background: rgba(0,0,0,0.9); color: #0f0;
    font-family: monospace; font-size: 10px;
    padding: 8px; border-radius: 4px;
    z-index: 9998; white-space: pre-wrap;
    border: 1px solid #0f0; display: none;
  }
  #debug-log.visible { display: block; }

  #info-panel {
    position: fixed; bottom: env(safe-area-inset-bottom, 0); left: 0; right: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.95));
    padding: 20px 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
    z-index: 9997; transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 60vh; overflow-y: auto;
    border-top: 3px solid #4CAF50; backdrop-filter: blur(12px);
  }
  #info-panel.open { transform: translateY(0); }
  #info-panel h2 { margin: 0 0 10px; font-size: 18px; }
  #info-panel .desc { line-height: 1.5; opacity: 0.92; font-size: 13px; margin-bottom: 12px; }
  #info-panel .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #info-panel .stat { background: rgba(255,255,255,0.08); padding: 8px;
    border-radius: 6px; text-align: center; }
  #info-panel .stat b { display: block; color: #4CAF50; font-size: 16px; }
  #info-panel .stat span { font-size: 10px; opacity: 0.7; text-transform: uppercase; }
  #close-info { position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: white; border: none;
    font-size: 14px; cursor: pointer; }

  /* Three.js canvas is created by MindAR — make sure it fills screen */
  #ar-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>

<!-- Import maps for clean three.js modules -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>

<div id="status">📷 Loading AR…</div>
<div id="debug-toggle" onclick="toggleDebug()">DEBUG</div>
<div id="debug-log"></div>

<div id="info-panel">
  <button id="close-info" aria-label="Close">✕</button>
  <h2 id="info-title">Stop</h2>
  <div class="desc" id="info-description"></div>
  <div class="stats" id="info-stats"></div>
</div>

<div id="ar-container"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

// =================================================================
// CONFIG
// =================================================================

// Set to true during alignment phase to SEE the occluder buildings.
// Set to false in production for invisible occlusion.
let DEBUG_VISIBLE = false;

// Path to the per-stop GLBs (produced by filter_glb.py)
const STOPS_BASE_URL = './stops/';

// Stop content data (same as v1, kept for info panel)
const STOPS = [
  { id: 'parklet', label: 'Parklet & Bürgerengagement', color: 0x4CAF50,
    description: 'Citizen-led neighborhood space: Quartiersrat meetings, energy community activities.',
    stats: { 'Sitzplätze': '12', 'Events/Jahr': '8', 'Mitglieder': '47', 'CO₂ gespart': '2.1 t' } },
  { id: 'ev_carport', label: 'EV-Charger / PV-Carport', color: 0x2196F3,
    description: 'Three EV chargers and three Stattauto sharing vehicles. PV-panel roof planned.',
    stats: { 'Ladesäulen': '3', 'Carsharing': '3', 'PV': '15 kWp', 'CO₂': '4.2 t' } },
  { id: 'refurbishment', label: 'Gebäudesanierung', color: 0xFF9800,
    description: 'Energy-efficient refurbishment: insulation, triple-glazed windows. 64% reduction.',
    stats: { 'Einsparung': '64%', 'CO₂-Red.': '45%', 'Vorher': '180', 'Nachher': '65' } },
  { id: 'mw_building', label: 'PV + Fernwärme', color: 0x9C27B0,
    description: '85 kWp rooftop PV connected to district heating network.',
    stats: { 'PV': '85 kWp', 'Haushalte': '42', 'Fernwärme': '240 kW', 'Anteil': '30%' } },
  { id: 'new_buildings', label: 'Neubau KfW-40', color: 0x00BCD4,
    description: 'KfW-40: heat pumps, triple-glazed windows, integrated PV.',
    stats: { 'Standard': 'KfW-40', 'Wohnungen': '28', 'WP-COP': '4.5', 'Heizbedarf': '<40' } },
];

// =================================================================
// DEBUG LOGGING
// =================================================================
const $log = document.getElementById('debug-log');
const $toggle = document.getElementById('debug-toggle');

function log(msg) {
  const t = new Date().toTimeString().slice(0, 8);
  $log.innerHTML = `[${t}] ${msg}\n` + $log.innerHTML;
  console.log(`[ASCEND] ${msg}`);
}

window.toggleDebug = () => {
  $log.classList.toggle('visible');
  $toggle.classList.toggle('active');
};

log('v2 starting');

// =================================================================
// OCCLUDER MATERIAL
// =================================================================
// This is THE technique: depth-only rendering.
// The material writes to the depth buffer but not to the color buffer.
// Real-world camera passthrough shows through where these meshes are,
// but virtual content BEHIND them gets z-clipped (occluded).
const occluderMaterial = new THREE.MeshBasicMaterial({
  colorWrite: false,
  depthWrite: true,
  side: THREE.DoubleSide,
});

// Debug material — used when DEBUG_VISIBLE is true, makes occluders visible
// with a semi-transparent color so we can verify alignment with real buildings.
function makeDebugMaterial(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    transparent: true,
    opacity: 0.45,
    side: THREE.DoubleSide,
    wireframe: false,
  });
}

function applyOccluderMaterial(scene, color) {
  scene.traverse(child => {
    if (child.isMesh) {
      child.material = DEBUG_VISIBLE
        ? makeDebugMaterial(color)
        : occluderMaterial;
      child.renderOrder = -10; // draw occluders BEFORE animations
    }
  });
}

// =================================================================
// MAIN AR SETUP
// =================================================================
const $status = document.getElementById('status');
const $panel = document.getElementById('info-panel');

let mindarThree = null;
const loader = new GLTFLoader();
const stopRoots = []; // root group per stop
const stopMeshes = {}; // loaded mesh cache by stop id

async function init() {
  log('Initializing MindAR + Three.js...');
  $status.className = 'loading';
  $status.innerHTML = '⏳ Loading AR…';

  try {
    mindarThree = new MindARThree({
      container: document.querySelector('#ar-container'),
      imageTargetSrc: 'https://jawhar00.github.io/Ascent-AR/targets.mind',
      maxTrack: 1,
      uiScanning: 'no',
      uiLoading: 'no',
      filterMinCF: 0.0001,
      filterBeta: 0.001,
    });

    const { renderer, scene, camera } = mindarThree;
    log('MindAR core created');

    // Crucial for occluder technique: enable depth testing globally
    renderer.sortObjects = true;
    renderer.setPixelRatio(window.devicePixelRatio);

    // Lighting (only affects DEBUG materials; doesn't affect occluder)
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    // Create one anchor per stop, attach root group, register handlers
    for (let i = 0; i < STOPS.length; i++) {
      const stop = STOPS[i];
      const anchor = mindarThree.addAnchor(i);
      const root = new THREE.Group();
      root.name = `stop-${stop.id}`;
      anchor.group.add(root);
      stopRoots.push(root);

      // Add a small floating beacon at QR origin so we know detection fires
      // even before the GLB loads
      const beaconGeo = new THREE.SphereGeometry(0.04, 16, 16);
      const beaconMat = new THREE.MeshBasicMaterial({ color: stop.color });
      const beacon = new THREE.Mesh(beaconGeo, beaconMat);
      beacon.position.set(0, 0.5, 0.3); // 50cm up, 30cm out from QR
      beacon.renderOrder = 10; // draw AFTER occluders
      root.add(beacon);
      // Animate beacon
      beacon.userData.baseY = 0.5;

      anchor.onTargetFound = () => onTargetFound(stop, root);
      anchor.onTargetLost = () => onTargetLost(stop);

      // Try to load this stop's GLB now (async)
      loadStopMesh(stop, root).catch(err => {
        log(`✗ Failed to load ${stop.id}.glb: ${err.message}`);
      });
    }

    await mindarThree.start();
    log('✓ AR session started');
    $status.className = '';
    $status.innerHTML = '📷 Scan an ASCEND QR code';

    // Render loop
    let frame = 0;
    renderer.setAnimationLoop(() => {
      frame++;
      // Animate beacons
      stopRoots.forEach(root => {
        const beacon = root.children.find(c => c.geometry?.type === 'SphereGeometry');
        if (beacon) {
          beacon.position.y = beacon.userData.baseY + Math.sin(frame * 0.05) * 0.05;
        }
      });
      renderer.render(scene, camera);
    });

  } catch (err) {
    log(`✗ Init error: ${err.message}`);
    $status.className = 'error';
    $status.innerHTML = `⚠️ ${err.message}`;
  }
}

async function loadStopMesh(stop, root) {
  log(`Loading ${stop.id}.glb…`);
  const url = `${STOPS_BASE_URL}${stop.id}.glb`;
  try {
    const gltf = await loader.loadAsync(url);
    applyOccluderMaterial(gltf.scene, stop.color);
    root.add(gltf.scene);
    stopMeshes[stop.id] = gltf.scene;
    const triCount = countTriangles(gltf.scene);
    log(`✓ ${stop.id}: ${triCount} triangles loaded`);
  } catch (err) {
    log(`⚠ ${stop.id}.glb not available (this is OK during Week 1)`);
    // Don't throw — beacon-only mode still works
  }
}

function countTriangles(obj) {
  let n = 0;
  obj.traverse(c => {
    if (c.isMesh && c.geometry.index) n += c.geometry.index.count / 3;
    else if (c.isMesh) n += c.geometry.attributes.position.count / 3;
  });
  return Math.round(n);
}

function onTargetFound(stop, root) {
  log(`✓ ${stop.id} detected`);
  $status.className = 'success';
  $status.innerHTML = `✓ ${stop.label}`;
  // Show info panel after stable detection
  clearTimeout(stop._timer);
  stop._timer = setTimeout(() => showInfoPanel(stop), 1000);
}

function onTargetLost(stop) {
  log(`× ${stop.id} lost`);
  clearTimeout(stop._timer);
  $status.className = '';
  $status.innerHTML = '📷 Scan an ASCEND QR code';
}

function showInfoPanel(stop) {
  document.getElementById('info-title').textContent = stop.label;
  document.getElementById('info-title').style.color = '#' + stop.color.toString(16).padStart(6, '0');
  document.getElementById('info-description').textContent = stop.description;
  document.getElementById('info-stats').innerHTML = Object.entries(stop.stats)
    .map(([k, v]) => `<div class="stat"><b>${v}</b><span>${k}</span></div>`)
    .join('');
  $panel.style.borderTopColor = '#' + stop.color.toString(16).padStart(6, '0');
  $panel.classList.add('open');
}

document.getElementById('close-info').addEventListener('click', () => {
  $panel.classList.remove('open');
});

// Allow toggling DEBUG_VISIBLE via long-press on the debug button
let pressTimer = null;
$toggle.addEventListener('touchstart', (e) => {
  pressTimer = setTimeout(() => {
    DEBUG_VISIBLE = !DEBUG_VISIBLE;
    log(`DEBUG_VISIBLE → ${DEBUG_VISIBLE}. Reload required.`);
    alert(`DEBUG_VISIBLE: ${DEBUG_VISIBLE}\nReload to apply.`);
  }, 800);
});
$toggle.addEventListener('touchend', () => clearTimeout(pressTimer));

// Start
init();
</script>
</body>
</html>
