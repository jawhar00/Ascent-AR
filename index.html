<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ASCEND AR Scanner</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: white;
      padding: 12px 20px; border-radius: 8px;
      font-size: 14px; z-index: 9999; text-align: center;
      max-width: 90%;
    }
    #status.success { background: rgba(76,175,80,0.95); }
    #status.error { background: rgba(244,67,54,0.95); }
    .hint {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white;
      padding: 10px 18px; border-radius: 6px;
      font-size: 12px; z-index: 9999; text-align: center;
      max-width: 85%;
    }
  </style>
</head>
<body>
  <div id="status">📷 Point camera at an ASCEND QR code</div>
  <div class="hint">Hold phone steady · Good lighting helps detection</div>

  <a-scene
    mindar-image="imageTargetSrc: https://jawhar00.github.io/Ascent-AR/targets.mind; maxTrack: 1; uiScanning: no; uiLoading: no"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: Parklet -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-parklet">
      <a-plane color="#4CAF50" opacity="0.6" height="0.5" width="1"></a-plane>
      <a-text value="Parklet" align="center" position="0 0.4 0" color="white" width="2"></a-text>
    </a-entity>

    <!-- Target 1: EV-Carport -->
    <a-entity mindar-image-target="targetIndex: 1" id="target-ev-carport">
      <a-plane color="#2196F3" opacity="0.6" height="0.5" width="1"></a-plane>
      <a-text value="EV-Carport" align="center" position="0 0.4 0" color="white" width="2"></a-text>
    </a-entity>

    <!-- Target 2: Refurbishment -->
    <a-entity mindar-image-target="targetIndex: 2" id="target-refurbishment">
      <a-plane color="#FF9800" opacity="0.6" height="0.5" width="1"></a-plane>
      <a-text value="Refurbishment" align="center" position="0 0.4 0" color="white" width="2"></a-text>
    </a-entity>

    <!-- Target 3: MW-Building -->
    <a-entity mindar-image-target="targetIndex: 3" id="target-mw-building">
      <a-plane color="#9C27B0" opacity="0.6" height="0.5" width="1"></a-plane>
      <a-text value="PV / District Heating" align="center" position="0 0.4 0" color="white" width="2"></a-text>
    </a-entity>

    <!-- Target 4: New Buildings -->
    <a-entity mindar-image-target="targetIndex: 4" id="target-new-buildings">
      <a-plane color="#00BCD4" opacity="0.6" height="0.5" width="1"></a-plane>
      <a-text value="New Buildings" align="center" position="0 0.4 0" color="white" width="2"></a-text>
    </a-entity>
  </a-scene>

  <script>
    const stops = [
      { id: 'parklet',       label: 'Parklet' },
      { id: 'ev-carport',    label: 'EV-Carport' },
      { id: 'refurbishment', label: 'Refurbishment' },
      { id: 'mw-building',   label: 'PV / District Heating' },
      { id: 'new-buildings', label: 'New Buildings' }
    ];

    const status = document.getElementById('status');
    let redirecting = false;

    window.addEventListener('DOMContentLoaded', () => {
      stops.forEach((stop, i) => {
        const target = document.querySelector(`#target-${stop.id}`);
        if (!target) return;

        target.addEventListener('targetFound', () => {
          if (redirecting) return;
          status.className = 'success';
          status.innerHTML = `✓ ${stop.label} detected — opening dashboard...`;
        });

        target.addEventListener('targetLost', () => {
          if (redirecting) return;
          status.className = '';
          status.innerHTML = '📷 Point camera at an ASCEND QR code';
        });
      });

      // Confirm redirect only after a stable detection (1s held)
      let stableDetectionTimers = {};
      stops.forEach((stop, i) => {
        const target = document.querySelector(`#target-${stop.id}`);
        if (!target) return;

        target.addEventListener('targetFound', () => {
          if (redirecting) return;
          stableDetectionTimers[stop.id] = setTimeout(() => {
            if (redirecting) return;
            redirecting = true;
            status.innerHTML = `🚀 Loading ${stop.label}...`;
            window.location.href = `https://playcanv.as/p/pgtU46sY/?stop=${stop.id}`;
          }, 1000);
        });

        target.addEventListener('targetLost', () => {
          if (stableDetectionTimers[stop.id]) {
            clearTimeout(stableDetectionTimers[stop.id]);
            delete stableDetectionTimers[stop.id];
          }
        });
      });
    });

    // Error handling for MindAR
    document.querySelector('a-scene').addEventListener('arError', (e) => {
      status.className = 'error';
      status.innerHTML = '⚠️ AR failed to start. Check camera permission.';
      console.error('MindAR error:', e);
    });
  </script>
</body>
</html>
